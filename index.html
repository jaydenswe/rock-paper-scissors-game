<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors game</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./index.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="intro">
      Welcome to my Rock-Paper-Scissors game for The Odin Project.
    </div>

    <div class="choices">
      <div class="choices-title">Choices</div>
      <div class="user-choice-outer">
        User Choice: <div id="user-choice-inner"> </div>
      </div>

      <div class="computer-choice-outer">
        Computer Choice: <div id="computer-choice-inner"> </div>
      </div>
    </div>
    
    <div class="results">
      <div class="score">
        <h1 class="scoreHeading">Score</h1>
      </div>

      <div class="userScore">
        <div class="userText" id="userText">User: <div id="userValue">0</div>
      </div>

      <div class="computerScore">
        <div class="computerText" id="computerText">Computer: <div id="computerValue">0</div></div>
      </div>

      <div id="result">
        
      </div>

      <div id="final-result">

      </div>
    </div>

    <div class="buttons">
      <button class="status" value="rock">
        Rock
      </button>
      <button class="status" value="paper">
        Paper
      </button>
      <button class="status" value="scissors">
        Scissors
      </button>
    </div>

    
  </div>
</body>
</html>
